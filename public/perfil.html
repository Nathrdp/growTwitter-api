<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowTwitter — Perfil</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: #F3E8FF;
        }

        .navbar {
            background: white;
            border-bottom: 1px solid var(--borda);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(124, 58, 237, 0.06);
        }

        .navbar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 700;
            color: var(--roxo-principal);
        }

        .navbar-logo span {
            font-size: 28px;
        }

        .navbar-acoes {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .navbar-acoes a {
            text-decoration: none;
            color: var(--texto-principal);
            font-size: 14px;
            font-weight: 500;
        }

        .avatar-nav {
            width: 38px;
            height: 38px;
            background: var(--roxo-principal);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
        }

        .container {
            max-width: 750px;
            margin: 0 auto;
            padding: 0 16px 40px;
        }

        .capa {
            background: linear-gradient(135deg, #7C3AED, #A855F7, #C084FC);
            height: 180px;
            border-radius: 0 0 0 0;
            position: relative;
            overflow: hidden;
        }

        .gato-capa {
            position: absolute;
            font-size: 60px;
            opacity: 0.2;
        }

        .gato-capa:nth-child(1) {
            top: 20px;
            left: 15%;
        }

        .gato-capa:nth-child(2) {
            top: 40px;
            right: 20%;
        }

        .gato-capa:nth-child(3) {
            bottom: 10px;
            right: 35%;
        }

        .btn-voltar {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .perfil-area {
            background: white;
            padding: 0 24px 24px;
            border-radius: 0 0 16px 16px;
            box-shadow: 0 2px 12px rgba(124, 58, 237, 0.06);
            margin-bottom: 16px;
        }

        .avatar-perfil {
            width: 90px;
            height: 90px;
            background: var(--roxo-principal);
            border-radius: 50%;
            border: 4px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            margin-top: -45px;
            margin-bottom: 12px;
        }

        .perfil-topo {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
        }

        .perfil-nome {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .perfil-username {
            color: var(--texto-secundario);
            font-size: 15px;
            margin-bottom: 12px;
        }

        .perfil-stats {
            display: flex;
            gap: 20px;
            margin-top: 16px;
        }

        .stat {
            cursor: pointer;
        }

        .stat-num {
            font-weight: 700;
            font-size: 16px;
        }

        .stat-label {
            font-size: 13px;
            color: var(--texto-secundario);
        }

        .btn-editar {
            background: transparent;
            color: var(--texto-principal);
            border: 1.5px solid var(--borda);
            border-radius: 50px;
            padding: 8px 18px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-editar:hover {
            border-color: var(--roxo-principal);
            color: var(--roxo-principal);
        }

        .btn-seguir-perfil {
            background: var(--roxo-principal);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-seguir-perfil:hover {
            background: var(--roxo-hover);
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid var(--borda);
            margin-bottom: 16px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 14px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            color: var(--texto-secundario);
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }

        .tab.ativo {
            color: var(--roxo-principal);
            border-bottom-color: var(--roxo-principal);
        }

        .card-tweet {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: 0 2px 12px rgba(124, 58, 237, 0.06);
        }

        .tweet-header {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
        }

        .avatar-mini {
            width: 44px;
            height: 44px;
            background: var(--roxo-principal);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .tweet-info-topo {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tweet-nome {
            font-weight: 600;
            font-size: 15px;
        }

        .tweet-username {
            color: var(--texto-secundario);
            font-size: 14px;
        }

        .tweet-tempo {
            color: var(--texto-secundario);
            font-size: 13px;
        }

        .tweet-conteudo {
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 14px;
        }

        .tweet-interacoes {
            display: flex;
            gap: 24px;
        }

        .interacao-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: var(--texto-secundario);
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px 8px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .interacao-btn:hover {
            background: var(--roxo-fundo);
            color: var(--roxo-principal);
        }

        .interacao-btn.liked {
            color: var(--like);
        }

        .interacao-btn span {
            font-size: 18px;
        }

        .feed-vazio {
            text-align: center;
            padding: 40px;
            color: var(--texto-secundario);
            background: white;
            border-radius: 16px;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="navbar-logo">
            <span>🐱</span> GrowTwitter
        </div>
        <div class="navbar-acoes">
            <a href="feed.html">🏠 Início</a>
            <div class="avatar-nav" onclick="irParaMeuPerfil()">🐱</div>
        </div>
    </nav>

    <div class="container">
        <div style="position:relative;">
            <div class="capa">
                <div class="gato-capa">🐱</div>
                <div class="gato-capa">😻</div>
                <div class="gato-capa">🐾</div>
                <button class="btn-voltar" onclick="history.back()">←</button>
            </div>
            <div class="perfil-area">
                <div class="perfil-topo">
                    <div class="avatar-perfil">🐱</div>
                    <div id="btn-acao-perfil" style="margin-top:16px;"></div>
                </div>
                <div class="perfil-nome" id="perfil-nome">Carregando...</div>
                <div class="perfil-username" id="perfil-username">@...</div>
                <div class="perfil-stats">
                    <div class="stat">
                        <div class="stat-num" id="stat-seguindo">0</div>
                        <div class="stat-label">Seguindo</div>
                    </div>
                    <div class="stat">
                        <div class="stat-num" id="stat-seguidores">0</div>
                        <div class="stat-label">Seguidores</div>
                    </div>
                    <div class="stat">
                        <div class="stat-num" id="stat-tweets">0</div>
                        <div class="stat-label">Miaumentos</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab ativo">Miaumentos</div>
            <div class="tab">Respostas</div>
            <div class="tab">Mídia</div>
        </div>

        <div id="lista-tweets-perfil">
            <div class="feed-vazio">Carregando miaumentos... 🐾</div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/perfil.js"></script>
</body>

</html>
